<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GURUMA｜大田区飲食店特化型SNS×MEOコンサルティング</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="icon" href="img/favicon.ico">
  <link rel="apple-touch-icon" href="img/favicon.ico">
  <style>
    :root {
      --indigo:    #6366f1;
      --purple:    #7c3aed;
      --pink:      #ec4899;
      --dark-bg:   #09090b;
      --dark-nav:  #040407;
      --light-bg:  #fafafa;
      --text-main: #0f0f0f;
      --text-sub:  #6b6b6b;
      --grad-main: linear-gradient(135deg, #6366f1, #7c3aed, #ec4899);
      --grad-text: linear-gradient(135deg, #a5b4fc, #f9a8d4);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--light-bg);
      color: var(--text-main);
      overflow-x: hidden;
      margin: 0;
    }

    /* グラデーションテキスト */
    .grad-text {
      background: var(--grad-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-text-light {
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* プライマリボタン */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      color: #ffffff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 15px 34px;
      border-radius: 100px;
      box-shadow: 0 8px 40px rgba(99,102,241,0.5);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 48px rgba(99,102,241,0.6);
    }

    /* ゴーストボタン（ダーク背景用） */
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      color: rgba(255,255,255,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      font-size: 13px;
      font-weight: 400;
      text-decoration: none;
      padding-bottom: 2px;
      transition: color .2s ease;
      background: none;
      cursor: pointer;
    }
    .btn-ghost:hover { color: #ffffff; }

    /* アウトラインボタン（ライト背景用） */
    .btn-outline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #9ca3af;
      color: #0f0f0f;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: background .2s ease, color .2s ease;
    }
    .btn-outline:hover { background: #0f0f0f; color: #fff; }

    /* セクションラベル */
    .section-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
      position: relative;
    }
    .section-label::before {
      content: '';
      display: inline-block;
      width: 24px;
      height: 2px;
      background: var(--grad-main);
      vertical-align: middle;
      margin-right: 10px;
    }

    /* スクロールフェードイン */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: .1s; }
    .reveal-delay-2 { transition-delay: .2s; }
    .reveal-delay-3 { transition-delay: .3s; }

    /* スクロールバー */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--light-bg); }
    ::-webkit-scrollbar-thumb { background: var(--indigo); border-radius: 3px; }

    /* ナビゲーション */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(255,255,255,0.8);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      transition: box-shadow .3s ease;
    }
    #navbar.scrolled {
      box-shadow: 0 4px 30px rgba(0,0,0,0.08);
    }
    .nav-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
      text-decoration: none;
    }
    .nav-link {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-sub);
      text-decoration: none;
      transition: color .2s ease;
    }
    .nav-link:hover { color: var(--indigo); }

    /* モバイルメニュー */
    #mobile-menu {
      display: none;
      background: rgba(255,255,255,0.97);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 16px 0;
    }
    #mobile-menu.open { display: block; }
    .mobile-nav-link {
      display: block;
      padding: 12px 24px;
      font-size: 14px;
      color: var(--text-main);
      text-decoration: none;
      font-weight: 400;
    }
    .mobile-nav-link:hover { color: var(--indigo); }
  </style>
</head>
<body class="antialiased">

<!-- Navigation -->
<nav id="navbar">
  <div style="max-width:1200px;margin:0 auto;padding:0 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;height:68px;">
      <!-- ロゴ -->
      <a href="#" class="nav-logo grad-text" style="letter-spacing:-1px;">GURUMA</a>

      <!-- PC リンク -->
      <div style="display:flex;align-items:center;gap:32px;" class="hidden md:flex">
        <a href="#concept"  class="nav-link">コンセプト</a>
        <a href="#services" class="nav-link">サービス</a>
        <a href="#flow"     class="nav-link">導入の流れ</a>
        <a href="#cases"    class="nav-link">実績・事例</a>
        <a href="#pricing"  class="nav-link">料金プラン</a>
        <a href="#faq"      class="nav-link">よくある質問</a>
        <a href="#contact"  class="btn-primary" style="font-size:12px;padding:11px 22px;">無料相談に申し込む</a>
      </div>

      <!-- ハンバーガー（モバイル） -->
      <button id="mobile-menu-btn" class="md:hidden" style="background:none;border:none;cursor:pointer;color:var(--text-main);">
        <i data-lucide="menu" style="width:24px;height:24px;"></i>
      </button>
    </div>
  </div>

  <!-- モバイルメニュー -->
  <div id="mobile-menu">
    <a href="#concept"  class="mobile-nav-link">コンセプト</a>
    <a href="#services" class="mobile-nav-link">サービス</a>
    <a href="#flow"     class="mobile-nav-link">導入の流れ</a>
    <a href="#cases"    class="mobile-nav-link">実績・事例</a>
    <a href="#pricing"  class="mobile-nav-link">料金プラン</a>
    <a href="#faq"      class="mobile-nav-link">よくある質問</a>
    <a href="#contact"  class="mobile-nav-link" style="color:var(--indigo);font-weight:700;">無料相談に申し込む →</a>
  </div>
</nav>

</body>
</html>
